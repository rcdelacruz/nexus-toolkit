name: mobile
description: "Flutter mobile app — iOS & Android"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase auth + database
  supabase_flutter: ^2.9.0

  # Navigation
  go_router: ^14.8.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Immutable models + JSON
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # HTTP client (for REST API calls to apps/web)
  http: ^1.4.0

  # Secure storage for tokens
  flutter_secure_storage: ^9.2.4

  # Google OAuth
  google_sign_in: ^6.2.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.4
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.4

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
