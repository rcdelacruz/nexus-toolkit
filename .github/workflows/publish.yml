name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"   # only publish when version changes
  workflow_dispatch:       # manual trigger from GitHub UI

jobs:
  publish:
    name: Build & publish
    runs-on: ubuntu-latest
    environment: pypi          # matches the trusted publisher environment name on PyPI
    permissions:
      id-token: write          # required for OIDC trusted publishing (no API token needed)
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel + sdist
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no PYPI_API_TOKEN secret needed.
        # One-time setup on PyPI:
        #   pypi.org → Your projects → nexus-mcp → Publishing → Add publisher
        #   Owner: rcdelacruz  Repo: nexus-mcp  Workflow: publish.yml  Environment: pypi
